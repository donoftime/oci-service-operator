{
  "controllers": {
    "autonomous-databases": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "compartmentId",
        "computeModel",
        "computeCount",
        "presence-sensitive booleans",
        "freeform tags",
        "defined tags",
        "adminPassword supplied through a Secret"
      ],
      "ordered_steps": [
        "Reject dbName drift before any OCI mutation.",
        "Move the autonomous database compartment before other mutable updates.",
        "Inject the admin-password Secret only when password rotation is configured.",
        "Generate a wallet Secret only when wallet generation is configured for a usable database."
      ],
      "reject_paths": [
        "dbName drift"
      ],
      "delete_steps": [
        "Record the returned delete work-request ID for operator visibility without using it as the confirmation source.",
        "Confirm deletion with GetAutonomousDatabase until the resource is not found."
      ],
      "boundary_notes": [
        "Wallet Secret cleanup is ownership-filtered and legacy unowned wallet Secrets are preserved.",
        "The formal secret-delete profile is stronger than current code because wallet cleanup is still best-effort."
      ],
      "features": [
        "move_compartment",
        "record_delete_work_request",
        "secret_owner_guard"
      ],
      "sequence_notes": [
        "AVAILABLE_NEEDS_ATTENTION is a usable active state alongside AVAILABLE."
      ]
    },
    "stream": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "streamPoolId",
        "freeform tags",
        "defined tags"
      ],
      "ordered_steps": [
        "Resolve the authoritative OCID from spec, status, or name lookup before any update or delete.",
        "Move the stream compartment before mutable updates when another supported drift already opens UpdateStream.",
        "Require MessagesEndpoint before generating the connection Secret."
      ],
      "reject_paths": [
        "name drift",
        "partitions drift",
        "retentionInHours drift"
      ],
      "delete_steps": [
        "Resolve the target stream ID from spec, status, or name lookup before submitting delete.",
        "Confirm deletion with GetStream until the lifecycle is DELETED or the resource is not found.",
        "Delete the owned Secret only after OCI delete confirmation."
      ],
      "boundary_notes": [
        "Compartment-only drift currently reaches the move path only when another mutable diff already triggers UpdateStream."
      ],
      "features": [
        "move_compartment",
        "secret_endpoint_required"
      ],
      "sequence_notes": [
        "OCI DELETING remains retryable during stream delete completion."
      ]
    },
    "mysql-dbsystem": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "displayName",
        "description",
        "configuration",
        "shape",
        "data storage growth",
        "hostnameLabel",
        "high availability",
        "backup policy",
        "maintenance window",
        "freeform tags",
        "defined tags"
      ],
      "ordered_steps": [
        "Turn transient 429 and 5xx OCI read failures into controller-managed requeues.",
        "Validate immutable fields before any mutable update."
      ],
      "reject_paths": [
        "compartmentId drift in the current code path",
        "immutable network-placement drift",
        "immutable admin-credential drift",
        "immutable source or version drift"
      ],
      "delete_steps": [
        "Look for an existing delete work request before submitting a duplicate delete.",
        "Wait for the matching DB system delete work request to succeed, or treat GetDbSystem not-found as complete.",
        "Attempt Secret cleanup only after OCI delete confirmation."
      ],
      "boundary_notes": [
        "Managed and name-resolved reconciles currently do not enter the update path, so mutable updates are effectively bound-ID only.",
        "The formal secret-delete profile is stronger than current code because Secret cleanup is still best-effort."
      ],
      "features": [
        "delete_work_request",
        "retryable_read_failures"
      ],
      "sequence_notes": [
        "INACTIVE and TRANSIENT_READ_ERROR behave as retryable outcomes."
      ]
    },
    "redis-cluster": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "displayName",
        "nodeCount",
        "nodeMemoryInGBs",
        "freeform tags",
        "defined tags"
      ],
      "ordered_steps": [
        "Always route resolved or bound resources through UpdateRedisCluster.",
        "Move the Redis cluster compartment before mutable updates when compartment drift exists."
      ],
      "reject_paths": [
        "softwareVersion drift",
        "subnetId drift"
      ],
      "delete_steps": [
        "Confirm deletion with GetRedisCluster until the lifecycle is DELETED or the resource is not found.",
        "Delete the owned Secret after OCI delete confirmation."
      ],
      "boundary_notes": [
        "A direct DeleteRedisCluster 404 currently short-circuits completion and can skip Secret cleanup on that branch."
      ],
      "features": [
        "move_compartment"
      ],
      "sequence_notes": [
        "Resolved-name and status-based binds both keep using the retained OCID for later update and delete."
      ]
    },
    "postgres-db-system": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "displayName",
        "description",
        "freeform tags",
        "defined tags"
      ],
      "ordered_steps": [
        "Validate immutable fields before any mutable update.",
        "Move the PostgreSQL DB system compartment before supported updates when compartment drift exists.",
        "Publish the primary endpoint and port through the connection Secret after a usable active reconcile."
      ],
      "reject_paths": [
        "dbVersion drift",
        "shape drift",
        "subnetId drift",
        "storageType drift",
        "instanceCount drift",
        "instanceOcpuCount drift",
        "instanceMemoryInGBs drift",
        "admin credential drift"
      ],
      "delete_steps": [
        "Confirm deletion with GetDbSystem until the resource is not found.",
        "Delete the owned Secret after OCI delete confirmation."
      ],
      "boundary_notes": [
        "Managed and name-resolved reconciles currently do not enter UpdatePostgresDbSystem, so mutable updates are effectively bound-ID only."
      ],
      "features": [
        "move_compartment"
      ],
      "sequence_notes": [
        "Secret generation publishes the primary endpoint and port view."
      ]
    },
    "oci-queue": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "displayName",
        "visibilityInSeconds",
        "timeoutInSeconds",
        "deadLetterQueueDeliveryCount",
        "freeform tags",
        "defined tags",
        "non-empty customEncryptionKeyId"
      ],
      "ordered_steps": [
        "Create is asynchronous; later list or get calls discover the OCID instead of polling the create work request.",
        "Move the queue compartment before other supported queue updates.",
        "Treat empty customEncryptionKeyId as a no-op rather than key removal."
      ],
      "reject_paths": [
        "retentionInSeconds drift"
      ],
      "delete_steps": [
        "Confirm deletion with GetQueue until the lifecycle is DELETED or the resource is not found.",
        "Delete the owned Secret after OCI delete confirmation."
      ],
      "boundary_notes": [
        "The create work-request ID is not persisted or polled."
      ],
      "features": [
        "move_compartment"
      ],
      "sequence_notes": [
        "The first name-resolved bind records the OCID and defers UpdateQueue until a later reconcile."
      ]
    },
    "functions-function": {
      "archetype": "resolved-drift-delete-secret",
      "update_surface": [
        "image",
        "memoryInMBs",
        "timeoutInSeconds",
        "config",
        "freeform tags",
        "defined tags"
      ],
      "ordered_steps": [
        "Reuse the spec ID, status ID, or name-resolved OCID for every later update and delete call.",
        "Write the invoke-endpoint Secret only when InvokeEndpoint is present."
      ],
      "reject_paths": [
        "applicationId drift",
        "displayName drift"
      ],
      "delete_steps": [
        "Confirm deletion with GetFunction until the lifecycle is DELETED or the resource is not found.",
        "Delete the owned Secret after OCI delete confirmation."
      ],
      "boundary_notes": [
        "The formal secret profile is stronger than current code because an active function without InvokeEndpoint still returns success without writing a Secret."
      ],
      "features": [
        "secret_endpoint_required"
      ],
      "sequence_notes": [
        "Retryable OCI states must not create invoke-endpoint Secrets."
      ]
    }
  }
}
