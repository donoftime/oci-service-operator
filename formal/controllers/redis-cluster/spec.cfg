SPECIFICATION Spec
CONSTANTS
    ControllerName = "RedisCluster"
    RetryableStates = {"CREATING", "UPDATING"}
    ActiveStates = {"ACTIVE"}
    FailedStates = {"FAILED", "DELETED"}
