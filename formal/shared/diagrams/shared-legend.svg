<?xml version="1.0" encoding="UTF-8" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="271px" preserveAspectRatio="none" style="width:2242px;height:271px;background:#FFFFFF;" version="1.1" viewBox="0 0 2242 271" width="2242px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="189" x="1019.5" y="22.9951">Shared Diagram Legend</text><!--entity lifecycle--><g id="elem_lifecycle"><rect fill="#E0F2FE" height="76.8906" rx="2.5" ry="2.5" style="stroke:#475569;stroke-width:0.5;" width="404" x="7" y="145.2969"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133" x="17" y="168.292">Blue lifecycle notes</text><line style="stroke:#475569;stroke-width:1.0;" x1="8" x2="410" y1="171.5938" y2="171.5938"/><line style="stroke:#475569;stroke-width:1.0;" x1="8" x2="410" y1="173.5938" y2="173.5938"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="318" x="17" y="188.5889">Retryable, active, and failed OCI state buckets.</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="384" x="17" y="204.8857">These come directly from the formal controller manifest.</text></g><!--entity ready--><g id="elem_ready"><rect fill="#DCFCE7" height="76.8906" rx="2.5" ry="2.5" style="stroke:#475569;stroke-width:0.5;" width="583" x="471" y="145.2969"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167" x="481" y="168.292">Green ready-path boxes</text><line style="stroke:#475569;stroke-width:1.0;" x1="472" x2="1053" y1="171.5938" y2="171.5938"/><line style="stroke:#475569;stroke-width:1.0;" x1="472" x2="1053" y1="173.5938" y2="173.5938"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="469" x="481" y="188.5889">Supported update, collection, resize, cleanup, and Secret branches.</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="563" x="481" y="204.8857">These combine TLA-proved capabilities with controller-local implementation detail.</text></g><!--entity boundary--><g id="elem_boundary"><rect fill="#FEF3C7" height="76.8906" rx="2.5" ry="2.5" style="stroke:#475569;stroke-width:0.5;" width="653" x="1114" y="93.2969"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158" x="1124" y="116.292">Amber boundary notes</text><line style="stroke:#475569;stroke-width:1.0;" x1="1115" x2="1766" y1="119.5938" y2="119.5938"/><line style="stroke:#475569;stroke-width:1.0;" x1="1115" x2="1766" y1="121.5938" y2="121.5938"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="464" x="1124" y="136.5889">Reject-before-mutate surfaces and accepted modeling boundaries.</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="633" x="1124" y="152.8857">These call out controller behavior that is important to readers or explicitly outside the model.</text></g><!--entity delete--><g id="elem_delete"><rect fill="#FFEDD5" height="60.5938" rx="2.5" ry="2.5" style="stroke:#475569;stroke-width:0.5;" width="588" x="1146.5" y="205.2969"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145" x="1156.5" y="228.292">Orange delete boxes</text><line style="stroke:#475569;stroke-width:1.0;" x1="1147.5" x2="1733.5" y1="231.5938" y2="231.5938"/><line style="stroke:#475569;stroke-width:1.0;" x1="1147.5" x2="1733.5" y1="233.5938" y2="233.5938"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="568" x="1156.5" y="248.5889">Delete confirmation, work-request tracking, Secret cleanup, and finalizer discipline.</text></g><!--entity 