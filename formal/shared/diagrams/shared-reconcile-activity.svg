ust="spacing" textLength="256" x="64.5" y="378.9355">Submit OCI delete and retain the finalizer</text><rect fill="#F8FAFC" height="33.9688" rx="12.5" ry="12.5" style="stroke:#475569;stroke-width:0.5;" width="256" x="64.5" y="426.7656"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="236" x="74.5" y="447.9043">Confirm that the OCI resource is gone</text><rect fill="#F8FAFC" height="33.9688" rx="12.5" ry="12.5" style="stroke:#475569;stroke-width:0.5;" width="236" x="74.5" y="495.7344"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="216" x="84.5" y="516.873">Optionally clean up owned Secrets</text><rect fill="#F8FAFC" height="33.9688" rx="12.5" ry="12.5" style="stroke:#475569;stroke-width:0.5;" width="343" x="21" y="551.8359"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="323" x="31" y="572.9746">Remove the finalizer only after deletion is confirmed</text><ellipse cx="192.5" cy="651.8047" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="192.5" cy="651.8047" fill="#222222" rx="6" ry="6" style="stroke:#111111;stroke-width:1.0;"/><rect fill="none" height="417.9766" style="stroke:#000000;stroke-width:1.5;" width="321" x="484" y="321.5"/><path d="M645,321.5 L645,330.7969 L635,340.7969 L484,340.7969 " fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151" x="487" y="335.4951">Lifecycle Classification</text><rect fill="#F8FAFC" height="33.9688" rx="12.5" ry="12.5" style="stroke:#475569;stroke-width:0.5;" width="129" x="574" y="406.1992"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="109" x="584" y="427.3379">Request requeue</text><ellipse cx="638.5" cy="486.168" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="638.5" 