" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="249.5" y="227.0591">3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197" x="262.5" y="227.0591">return a work-request identifier</text><polygon fill="#334155" points="764.5,257.2578,774.5,261.2578,764.5,265.2578,768.5,261.2578" style="stroke:#334155;stroke-width:1.0;"/><line style="stroke:#334155;stroke-width:1.0;" x1="232.5" x2="770.5" y1="261.2578" y2="261.2578"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="239.5" y="256.1919">4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="454" x="252.5" y="256.1919">wait for the matching delete work request when the controller models it</text><path d="M158.5,283.2578 L235.5,283.2578 L235.5,290.3906 L225.5,300.3906 L158.5,300.3906 L158.5,283.2578 " fill="#F8FAFC" style="stroke:#475569;stroke-width:1.5;"/><rect fill="none" height="46.2656" style="stroke:#475569;stroke-width:1.5;" width="336" x="158.5" y="283.2578"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="32" x="173.5" y="296.3247">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="192" x="250.5" y="295.4683">[until the delete is confirmed]</text><polygon fill="#334155" points="454.5,317.5234,464.5,321.5234,454.5,325.5234,458.5,321.5234" style="stroke:#334155;stroke-width:1.0;"/><line style="stroke:#334155;stroke-width:1.0;" x1="232.5" x2="460.5" y1="321.5234" y2="321.5234"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="239.5" y="316.4575">5</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158" x="252.5" y="316.4575">Get the current resource</text><path d="M158.5,343.5234 L228.5,343.5234 L228.5,350.6563 L218.5,360.6563 L158.5,360.6563 L158.5,343.5234 " fill="#F8FAFC" style="stroke:#475569;stroke-width:1.5;"/><rect fill="none" height="46.2656" style="stroke:#475569;stroke-width:1.5;" width="560" x="158.5" y="343.5234"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="25" x="173.5" y="356.5903">opt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="240" x="243.5" y="355.7339">[controller owns a Secret side effect]</text><polygon fill="#334155" points="640.5,377.7891,650.5,381.7891,640.5,385.7891,644.5,381.7891" style="stroke:#334155;stroke-width:1.0;"/><line style="stroke:#334155;stroke-width:1.0;" x1="232.5" x2="646.5" y1="381.7891" y2="381.7891"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="239.5" y="376.7231">6</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="383" x="252.5" y="376.7231">delete the owned Secret only after OCI deletion is confirmed</text><polygon fill="#334155" points="640.5,413.9219,650.5,417.9219,640.5,421.9219,644.5,417.9219" style="stroke:#334155;stroke-width:1.0;"/><line style="stroke:#334155;stroke-width:1.0;" x1="232.5" x2="646.5" y1="417.9219" y2="417.9219"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="239.5" y="412.856">7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300" x="252.5" y="412.856">remove the finalizer after deletion confirmation</text><path d="M141,430.9219 L141,485.9219 L743,485.9219 L743,440.9219 L733,430.9219 L141,430.9219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M733,430.9219 L733,440.9219 L743,440.9219 L733,430.9219 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315" x="147" y="447.9888">- Finalizers remain until OCI deletion is confirmed.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="549" x="147" y="463.1216">- Secret cleanup failures block completion when the controller models Secret deletion.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="581" x="147" y="478.2544">- Missing Secrets may still allow completion for controllers that treat deletion as best effort.</text><!--SRC=[VLHDJnin4BtxLupIQuDe8H1og1G2Yn2WegPIpvFTsSIArzwElQIqwd_lUECaIqZA9QpdlJTlFkoWWo6OBf2fW1io50ZG5f1fYqR_9eOf_Mp8vgIm2SusrOnO-QMsDJ9Mu1TOk9MsSoZHUEf4hZ5VpjarjfWuunW-PErV1p5cTgiKF3ix_pGOT885bTYOy9r-XR7HSrkH3M2e3DtaoHhyKG3Fo47dkaORtgSUPkDiiWToN10dmFdbO71n9O17NTAZjlGcUdK-FhiUTgD7QWEuazFwiFGwTDJQE0-EtuLlJxFFsUqst1K-pIulBcxLNuKn1Bs9iu6TCSGzG0-xJrNlgeRUbFX5Iy-UqE8yOTDPEb851foX9-XzdTot0Fdjd3uqiWHMLiN3-7aDU1XwbSTiUT3EUkZzSBo4Rt50FhI8U92-bTgPW_wNlVGZOCgTpRKiPh7UI4wyjy185MCZyCsiqY7-dmZArM73hJ4iH20qBBOGLcAZd_JW_aOw6sdzWouYPv-Y2rb4NMff4y1xFvqgHx12SLNARCA2eCAGB-95IRwYwgOmM2t8jgXyrvZA2TA33efieOnpDJIIshIu9A9zP9IQAoeE-cdxSqTXBTumnsl4v5t3SgMZS6nL9wjRjMsQKYxrWvToWSfIndfGNiO-sdY96OGjxqWYEsjU0SiWqEreP3dUceuMZkWoLUvbhLjkdwErtbOh2M7yKCewyI4SthFwCQvdV_Ue-QYDsgQ67dLt8gHKJ6u8RLFBCwTD8ms4cN7vKg1LdOZ_cM7IsEI8ia_Q-xWDwv2NzNW5BsOCe35krHME6xJJz983PPvCk5EC5smM5qbcvJYSnBP2x8Rw1m00]--></g></svg>