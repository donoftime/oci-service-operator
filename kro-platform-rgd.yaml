apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: osok-platform
spec:
  schema:
    apiVersion: v1alpha1
    kind: OSOKPlatform
    spec:
      compartmentId: string
      availabilityDomain: string
      cidrBlock: string
      subnetCidrBlock: string
      lbSubnetId: string
      serviceGatewayServiceId: string
      serviceGatewayDestination: string
      objectStorageNamespace: string
      dataflowFileUri: string
      dataflowWarehouseBucketUri: string
      mysqlCredentialsSecret: string
      adbAdminPasswordSecret: string
      adbDbName: string
      nosqlTableName: string
      containerImageUrl: string
      functionImageUrl: string
      imageId: string

  resources:
    # ── 1. Object Storage Bucket ──────────────────────────────────────────────
    - id: objectStorageBucket
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: ObjectStorageBucket
        metadata:
          name: ${schema.metadata.name}-bucket
        spec:
          compartmentId: ${schema.spec.compartmentId}
          name: ${schema.metadata.name}-bucket
          namespace: ${schema.spec.objectStorageNamespace}
          accessType: NoPublicAccess
          storageType: Standard
          versioning: Enabled

    # ── 2. OCI Data Flow Application ─────────────────────────────────────────
    # The SQL application file must already exist in Object Storage. The logs
    # bucket is still the platform bucket created above, so kro establishes a
    # bucket -> Data Flow dependency for logs even though the SQL file itself is
    # pre-uploaded out of band.
    - id: dataflowApplication
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: DataFlowApplication
        metadata:
          name: ${schema.metadata.name}-dataflow
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-dataflow
          language: SQL
          driverShape: VM.Standard2.1
          executorShape: VM.Standard2.1
          numExecutors: 1
          sparkVersion: "3.2.1"
          fileUri: ${schema.spec.dataflowFileUri}
          logsBucketUri: "oci://${objectStorageBucket.spec.name}@${schema.spec.objectStorageNamespace}/dataflow-logs"
          warehouseBucketUri: ${schema.spec.dataflowWarehouseBucketUri}
          description: "Uses Object Storage bucket ${objectStorageBucket.status.status.ocid} for Data Flow logs"

    # ── 3. Oracle Streaming Service ───────────────────────────────────────────
    - id: stream
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: Stream
        metadata:
          name: ${schema.metadata.name}-stream
        spec:
          compartmentId: ${schema.spec.compartmentId}
          name: ${schema.metadata.name}-stream
          partitions: 1
          retentionInHours: 24

    # ── 4. OCI Queue ──────────────────────────────────────────────────────────
    - id: queue
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciQueue
        metadata:
          name: ${schema.metadata.name}-queue
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-queue
          retentionInSeconds: 86400
          visibilityInSeconds: 30
          deadLetterQueueDeliveryCount: 3

    # ── 5. Autonomous Database ────────────────────────────────────────────────
    - id: adb
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: AutonomousDatabases
        metadata:
          name: ${schema.metadata.name}-adb
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-adb
          dbName: ${schema.spec.adbDbName}
          dbWorkload: OLTP
          computeModel: ECPU
          computeCount: 2
          dataStorageSizeInTBs: 1
          isAutoScalingEnabled: false
          isFreeTier: false
          adminPassword:
            secret:
              secretName: ${schema.spec.adbAdminPasswordSecret}

    # ── 6. Dynamic Routing Gateway ────────────────────────────────────────────
    # Exercises the OciDrg resource/controller directly. This example does not
    # create a DRG attachment, so the DRG remains standalone and is not wired
    # into the VCN topology.
    - id: drg
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciDrg
        metadata:
          name: ${schema.metadata.name}-drg
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-drg

    # ── 7. NoSQL Table ────────────────────────────────────────────────────────
    - id: nosqlTable
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: NoSQLDatabase
        metadata:
          name: ${schema.metadata.name}-nosql
        spec:
          compartmentId: ${schema.spec.compartmentId}
          name: ${schema.spec.nosqlTableName}
          ddlStatement: >-
            CREATE TABLE IF NOT EXISTS ${schema.spec.nosqlTableName}
            (id STRING, ts TIMESTAMP(3), payload JSON, PRIMARY KEY(id))
          tableLimits:
            maxReadUnits: 50
            maxWriteUnits: 50
            maxStorageInGBs: 1

    # ── 8. API Gateway ────────────────────────────────────────────────────────
    # Uses a pre-existing public/LB subnet (lbSubnetId) — the platform subnet
    # prohibits public IPs, so API Gateway needs its own public-facing subnet.
    - id: apiGateway
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: ApiGateway
        metadata:
          name: ${schema.metadata.name}-apigw
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-apigw
          endpointType: PUBLIC
          subnetId: ${schema.spec.lbSubnetId}

    # ── 9. API Gateway Deployment ────────────────────────────────────────────
    # Depends on apiGateway. Serves a stock health-check response.
    - id: apiGatewayDeployment
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: ApiGatewayDeployment
        metadata:
          name: ${schema.metadata.name}-apigw-deploy
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-apigw-deploy
          gatewayId: ${apiGateway.status.status.ocid}
          pathPrefix: /v1
          routes:
            - path: /health
              methods:
                - GET
              backend:
                type: STOCK_RESPONSE_BACKEND
                status: 200
                body: '{"status":"ok"}'

    # ── 10. VCN ───────────────────────────────────────────────────────────────
    # Foundation of the network topology. Gateway, route table, and subnet
    # resources depend on this OCID.
    - id: vcn
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciVcn
        metadata:
          name: ${schema.metadata.name}-vcn
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-vcn
          cidrBlock: ${schema.spec.cidrBlock}
          dnsLabel: platform

    # ── 11. Internet Gateway ──────────────────────────────────────────────────
    # Created for public-subnet use cases. The private subnet below uses the
    # NAT Gateway for outbound internet traffic.
    - id: internetGateway
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciInternetGateway
        metadata:
          name: ${schema.metadata.name}-igw
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-igw
          isEnabled: true
      readyWhen:
        - ${internetGateway.status.status.ocid != ""}

    # ── 12. NAT Gateway ───────────────────────────────────────────────────────
    - id: natGateway
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciNatGateway
        metadata:
          name: ${schema.metadata.name}-ngw
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-ngw
          blockTraffic: false
      readyWhen:
        - ${natGateway.status.status.ocid != ""}

    # ── 13. Service Gateway ───────────────────────────────────────────────────
    - id: serviceGateway
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciServiceGateway
        metadata:
          name: ${schema.metadata.name}-sgw
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-sgw
          services:
            - ${schema.spec.serviceGatewayServiceId}
      readyWhen:
        - ${serviceGateway.status.status.ocid != ""}

    # ── 14. Route Table ───────────────────────────────────────────────────────
    # Routes via NAT Gateway (outbound internet) and Service Gateway (OCI services).
    # Subnet depends on this OCID.
    - id: routeTable
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciRouteTable
        metadata:
          name: ${schema.metadata.name}-rt
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-rt
          routeRules:
            - destination: "0.0.0.0/0"
              networkEntityId: ${natGateway.status.status.ocid}
              destinationType: CIDR_BLOCK
            - destination: ${schema.spec.serviceGatewayDestination}
              networkEntityId: ${serviceGateway.status.status.ocid}
              destinationType: SERVICE_CIDR_BLOCK
      readyWhen:
        - ${routeTable.status.status.ocid != ""}

    # ── 15. Security List ─────────────────────────────────────────────────────
    - id: securityList
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciSecurityList
        metadata:
          name: ${schema.metadata.name}-seclist
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-seclist
          egressSecurityRules:
            - protocol: "all"
              destination: "0.0.0.0/0"
              destinationType: CIDR_BLOCK
              isStateless: false
              description: "Allow outbound internet via NAT"
            - protocol: "all"
              destination: ${schema.spec.serviceGatewayDestination}
              destinationType: SERVICE_CIDR_BLOCK
              isStateless: false
              description: "Allow all egress to OCI services via SGW"
          ingressSecurityRules:
            - protocol: "6"
              source: ${schema.spec.subnetCidrBlock}
              isStateless: false
              description: "Allow TCP within subnet"
            - protocol: "6"
              source: "0.0.0.0/0"
              isStateless: false
              description: "Allow OpenSearch API access"
              tcpOptions:
                destinationPortRange:
                  min: 9200
                  max: 9200
            - protocol: "6"
              source: "0.0.0.0/0"
              isStateless: false
              description: "Allow OpenSearch Dashboards access"
              tcpOptions:
                destinationPortRange:
                  min: 5601
                  max: 5601
      readyWhen:
        - ${securityList.status.status.ocid != ""}

    # ── 16. Network Security Group ────────────────────────────────────────────
    # Attached to the Functions application below to exercise NSG references.
    - id: networkSecurityGroup
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciNetworkSecurityGroup
        metadata:
          name: ${schema.metadata.name}-nsg
        spec:
          compartmentId: ${schema.spec.compartmentId}
          vcnId: ${vcn.status.status.ocid}
          displayName: ${schema.metadata.name}-nsg
      readyWhen:
        - ${networkSecurityGroup.status.status.ocid != ""}

    # ── 17. Subnet ────────────────────────────────────────────────────────────
    # Private subnet (no public IPs). All network-attached services use this.
    - id: subnet
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OciSubnet
        metadata:
          name: ${schema.metadata.name}-subnet
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-subnet
          vcnId: ${vcn.status.status.ocid}
          cidrBlock: ${schema.spec.subnetCidrBlock}
          dnsLabel: private
          prohibitPublicIpOnVnic: true
          routeTableId: ${routeTable.status.status.ocid}
          securityListIds:
            - ${securityList.status.status.ocid}
      readyWhen:
        - ${subnet.status.status.conditions.filter(c, c.type == "Active" && c.status == "True").size() > 0}

    # ── 18. MySQL DB System ───────────────────────────────────────────────────
    - id: mysql
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: MySqlDbSystem
        metadata:
          name: ${schema.metadata.name}-mysql
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-mysql
          shapeName: MySQL.VM.Standard.E3.1.8GB
          subnetId: ${subnet.status.status.ocid}
          availabilityDomain: ${schema.spec.availabilityDomain}
          mysqlVersion: "8.0.42"
          dataStorageSizeInGBs: 50
          adminUsername:
            secret:
              secretName: ${schema.spec.mysqlCredentialsSecret}
          adminPassword:
            secret:
              secretName: ${schema.spec.mysqlCredentialsSecret}

    # ── 19. PostgreSQL DB System ──────────────────────────────────────────────
    - id: postgres
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: PostgresDbSystem
        metadata:
          name: ${schema.metadata.name}-postgres
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-postgres
          dbVersion: "14"
          shape: PostgreSQL.VM.Standard.E5.Flex
          subnetId: ${subnet.status.status.ocid}
          instanceCount: 1
          instanceOcpuCount: 2
          instanceMemoryInGBs: 32
          adminUsername:
            secret:
              secretName: ${schema.spec.mysqlCredentialsSecret}
          adminPassword:
            secret:
              secretName: ${schema.spec.mysqlCredentialsSecret}

    # ── 20. OCI Cache with Redis ──────────────────────────────────────────────
    - id: redisCluster
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: RedisCluster
        metadata:
          name: ${schema.metadata.name}-redis
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-redis
          softwareVersion: V7_0_5
          nodeCount: 3
          nodeMemoryInGBs: 2
          subnetId: ${subnet.status.status.ocid}

    # ── 21. OpenSearch Cluster ────────────────────────────────────────────────
    - id: opensearch
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: OpenSearchCluster
        metadata:
          name: ${schema.metadata.name}-opensearch
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-opensearch
          softwareVersion: "2.11.0"
          masterNodeCount: 3
          masterNodeHostType: FLEX
          masterNodeHostOcpuCount: 2
          masterNodeHostMemoryGB: 32
          dataNodeCount: 3
          dataNodeHostType: FLEX
          dataNodeHostOcpuCount: 4
          dataNodeHostMemoryGB: 64
          dataNodeStorageGB: 100
          opendashboardNodeCount: 1
          opendashboardNodeHostOcpuCount: 2
          opendashboardNodeHostMemoryGB: 32
          vcnId: ${vcn.status.status.ocid}
          vcnCompartmentId: ${schema.spec.compartmentId}
          subnetId: ${subnet.status.status.ocid}
          subnetCompartmentId: ${schema.spec.compartmentId}

    # ── 22. Container Instance ────────────────────────────────────────────────
    - id: containerInstance
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: ContainerInstance
        metadata:
          name: ${schema.metadata.name}-ci
        spec:
          compartmentId: ${schema.spec.compartmentId}
          availabilityDomain: ${schema.spec.availabilityDomain}
          displayName: ${schema.metadata.name}-ci
          shape: CI.Standard.x86.Generic
          shapeConfig:
            ocpus: 1
            memoryInGBs: 4
          containers:
            - imageUrl: ${schema.spec.containerImageUrl}
              displayName: app
              command:
                - /bin/sh
                - -c
                - sleep infinity
              environmentVariables:
                COMPARTMENT_ID: ${schema.spec.compartmentId}
          vnics:
            - subnetId: ${subnet.status.status.ocid}
              displayName: primary-vnic
          containerRestartPolicy: ON_FAILURE

    # ── 23. Compute Instance ──────────────────────────────────────────────────
    - id: computeInstance
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: ComputeInstance
        metadata:
          name: ${schema.metadata.name}-vm
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-vm
          availabilityDomain: ${schema.spec.availabilityDomain}
          shape: VM.Standard.E4.Flex
          shapeConfig:
            ocpus: 1
            memoryInGBs: 16
          imageId: ${schema.spec.imageId}
          subnetId: ${subnet.status.status.ocid}

    # ── 24. Functions Application ─────────────────────────────────────────────
    # Runs on the platform subnet and references the NSG above so the example
    # exercises both networking and Functions controller dependencies.
    - id: functionsApplication
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: FunctionsApplication
        metadata:
          name: ${schema.metadata.name}-functions-app
        spec:
          compartmentId: ${schema.spec.compartmentId}
          displayName: ${schema.metadata.name}-functions-app
          subnetIds:
            - ${subnet.status.status.ocid}
          networkSecurityGroupIds:
            - ${networkSecurityGroup.status.status.ocid}
          shape: GENERIC_X86
          config:
            PLATFORM_NAME: ${schema.metadata.name}
      readyWhen:
        - ${functionsApplication.status.status.ocid != ""}

    # ── 25. Functions Function ────────────────────────────────────────────────
    - id: functionsFunction
      template:
        apiVersion: oci.oracle.com/v1beta1
        kind: FunctionsFunction
        metadata:
          name: ${schema.metadata.name}-function
        spec:
          applicationId: ${functionsApplication.status.status.ocid}
          displayName: ${schema.metadata.name}-function
          image: ${schema.spec.functionImageUrl}
          memoryInMBs: 256
          timeoutInSeconds: 30
          config:
            LOG_LEVEL: info
