version: "2"

run:
  timeout: 10m
  modules-download-mode: vendor
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - durationcheck
    - errorlint
    - gocheckcompilerdirectives
    - gocognit
    - gocyclo
    - maintidx
    - nolintlint
  settings:
    cyclop:
      max-complexity: 10
      package-average: 5.0
    errcheck:
      check-blank: true
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 10
    maintidx:
      under: 20
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - maintidx
      - path: zz_generated\.deepcopy\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - maintidx
      - path: ^main\.go$
        linters:
          - maintidx
